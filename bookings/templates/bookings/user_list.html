{% extends "bookings/base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<h2>Users</h2>
<a href="{% url 'user_create' %}" class="btn btn-primary mb-3">Add User</a>
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Role</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="2" class="text-center">No users found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
