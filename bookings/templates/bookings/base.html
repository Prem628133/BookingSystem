<!-- bookings/templates/bookings/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Booking System{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { padding-top: 70px; }
        .sidebar { min-width: 200px; max-width: 200px; height: 100vh; position: fixed; top: 70px; left: 0; background-color: #f8f9fa; padding: 20px; }
        .content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'booking_list' %}">BookingSystem</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'booking_list' %}">Bookings</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'service_list' %}">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'offer_list' %}">Offers</a></li>
                {% if request.user.role == 'ADMIN' %}
                <li class="nav-item"><a class="nav-link" href="{% url 'user_list' %}">Users</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="sidebar">
    <h5>Quick Links</h5>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="{% url 'booking_list' %}">Bookings</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'service_list' %}">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'offer_list' %}">Offers</a></li>
        {% if request.user.role == 'ADMIN' %}
        <li class="nav-item"><a class="nav-link" href="{% url 'user_list' %}">Users</a></li>
        {% endif %}
    </ul>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
